<!DOCTYPE html>
<html lang="en">
<head>
  <title>box shadow</title>
  <style>
    .box{
      margin: 20px;
      height: 100px;
      width: 400px;
      background-color: antiquewhite;
      overflow: auto;
      min-height: 100px;
      max-height: 300px;
      min-width: 200px;
      max-width: 500px;
      margin: 10px auto;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-family: cursive;
      box-shadow: 10px 10px 10px rgb(225, 23, 23);


    }
  
  </style>
</head>
<body>
  <div class="box">mybox
   
  </div>
  
</body>
</html>
