<!DOCTYPE html>
<html lang="en">
<head>
  <title>css variable</title>
  <style>
    html{
      --main-bg-color: rgb(216, 212, 212);
      --main-box-color: rgb(139, 105, 184);
      --main-text-color: rgb(49, 46, 46);
      
    }
    
    
    .container{
      display: flex;
      padding: 10px;
      background-color: rgb(97, 95, 92);
    }
    .box{
      background-color: antiquewhite;
      margin: 10px;
      border: 5px solid rebeccapurple;
      border-radius: 5px;
      height: 50px;
      width: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--main-box-color);
      background-color: var(--main-bg-color);
      
    }

  </style>
</head>
<body>
  <div class="container">
  <div class="box">Box1</div>
  <div class="box">Box2</div>
  <div class="box">Box3</div>
  <div class="box">Box4</div>
  </div>

  
</body>
</html>
